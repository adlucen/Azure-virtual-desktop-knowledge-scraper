---
# AVD Knowledge Scraper Configuration

scraping_targets:
  
  # Microsoft Official Documentation
  microsoft_learn:
    enabled: true
    update_frequency: "weekly"
    base_urls:
      - "https://learn.microsoft.com/en-us/azure/virtual-desktop/"
      - "https://learn.microsoft.com/en-us/fslogix/"
      - "https://learn.microsoft.com/en-us/windows-365/"
      - "https://learn.microsoft.com/en-us/mem/intune/"
    depth: 3
    output_dir: "output/microsoft_docs"
    
  # Azure Updates & What's New
  azure_updates:
    enabled: true
    update_frequency: "daily"
    rss_feeds:
      - "https://azure.microsoft.com/en-us/updates/feed/"
    keywords:
      - "virtual desktop"
      - "AVD"
      - "WVD"
      - "FSLogix"
      - "MSIX"
      - "Intune"
      - "Entra"
    output_dir: "output/azure_updates"
    
  # Expert Blogs
  expert_blogs:
    enabled: true
    update_frequency: "weekly"
    blogs:
      - name: "Christiaan Brinkhoff"
        url: "https://christiaanbrinkhoff.com"
        rss: "https://christiaanbrinkhoff.com/feed/"
      - name: "Tom Hickling"
        url: "https://xenithit.blogspot.com"
        rss: "https://xenithit.blogspot.com/feeds/posts/default"
      - name: "Marcel Meurer"
        url: "https://marcelmeurer.com"
        rss: "https://marcelmeurer.com/feed/"
      - name: "Nerdio"
        url: "https://getnerdio.com/blog/"
        rss: "https://getnerdio.com/feed/"
    output_dir: "output/blogs"
    
  # Reddit Communities
  reddit:
    enabled: true
    update_frequency: "daily"
    subreddits:
      - "AZURE"
      - "sysadmin"
      - "Intune"
    keywords:
      - "AVD"
      - "Azure Virtual Desktop"
      - "FSLogix"
      - "MSIX app attach"
      - "session host"
      - "host pool"
    limit_per_sub: 50
    output_dir: "output/reddit"

  # Stack Overflow Q&A via Stack Exchange API
  stack_overflow:
    enabled: true
    update_frequency: "weekly"
    tags:
      - "azure-virtual-desktop"
      - "fslogix"
      - "microsoft-intune"
      - "azure-rm"
      - "azure-active-directory"
      - "microsoft-graph-api"
      - "azure-ad-b2c"
      - "powershell"
    min_score: 3
    questions_per_tag: 50
    include_answers: 3
    api_key: ""   # optional — register at https://stackapps.com/apps/oauth/register
    output_dir: "output/stackoverflow"

  # GitHub issues in Azure / AVD / FSLogix / Intune repos
  github:
    enabled: true
    update_frequency: "weekly"
    repos:
      - "MicrosoftDocs/azure-docs"
      - "Azure/RDS-Templates"
      - "MicrosoftDocs/fslogix-docs"
      - "Azure/azure-powershell"
      - "microsoft/Intune-PowerShell-SDK"
      - "MicrosoftDocs/memdocs"
    labels_filter: []   # empty = all issues; add label names to filter
    state: "closed"     # closed issues are resolved = higher signal
    min_comments: 2
    issues_per_repo: 100
    max_comments_per_issue: 20
    api_key: ""         # optional — uses GITHUB_TOKEN env var if blank
    output_dir: "output/github"

  # Microsoft Tech Community blogs & Q&A boards
  tech_community:
    enabled: true
    update_frequency: "daily"
    boards:
      - name: "Azure Virtual Desktop Blog"
        rss: "https://techcommunity.microsoft.com/t5/azure-virtual-desktop/bg-p/AzurevirtualDesktopBlog/rss"
        type: "blog"
      - name: "FSLogix"
        rss: "https://techcommunity.microsoft.com/t5/fslogix/ct-p/FSLogix/rss"
        type: "blog"
      - name: "Intune Customer Success"
        rss: "https://techcommunity.microsoft.com/t5/intune-customer-success/bg-p/IntuneCustomerSuccess/rss"
        type: "blog"
      - name: "Windows 365"
        rss: "https://techcommunity.microsoft.com/t5/windows-365/bg-p/Windows365Blog/rss"
        type: "blog"
    max_posts_per_board: 50
    fetch_replies: true
    output_dir: "output/tech_community"

# Output formatting
output:
  format: "markdown"
  frontmatter_format: "yaml"
  include_metadata:
    - source
    - url
    - timestamp
    - category
    - tags
    - author

# Deduplication
deduplication:
  enabled: true
  method: "content_hash"
  similarity_threshold: 0.85

# Rate limiting
rate_limiting:
  requests_per_minute: 30
  respect_robots_txt: true
  user_agent: "AVD-Knowledge-Bot/1.0 (Educational Purpose)"

# Content processing
content_processing:
  remove_navigation: true
  remove_ads: true
  extract_code_blocks: true
  preserve_images: true
  image_download: false
  max_content_length: 50000
